name: Smoke CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-fast:
    name: Build and Smoke (Fast, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    env:
      SMOKE_GLOBAL_MIN_SCORE: '95'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run unit and integration tests
        run: npm run test

      - name: Run golden prompt gate
        run: npm run test:golden

      - name: Run smoke validation (fast)
        run: npm run smoke:fast

  smoke-full:
    name: Build and Smoke (Full)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    env:
      SMOKE_GLOBAL_MIN_SCORE: '95'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run unit and integration tests
        run: npm run test

      - name: Run golden prompt gate
        run: npm run test:golden

      - name: Run smoke validation (full)
        run: npm run smoke:full
